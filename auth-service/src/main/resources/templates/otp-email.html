<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>OTP Verification</title>
    <meta charset="UTF-8">
</head>

<body style="margin:0; padding:0; background-color:#f4f6f8; font-family:Arial, sans-serif;">

<table width="100%" cellpadding="0" cellspacing="0" style="padding:20px;">
    <tr>
        <td align="center">

            <!-- Main Container -->
            <table width="400" cellpadding="0" cellspacing="0"
                   style="background:#ffffff; border-radius:10px; padding:25px; box-shadow:0 4px 10px rgba(0,0,0,0.05);">

                <!-- Header -->
                <tr>
                    <td align="center" style="padding-bottom:15px;">
                        <h2 style="margin:0; color:#2c3e50;">🔐 OTP Verification</h2>
                    </td>
                </tr>

                <!-- Greeting -->
                <tr>
                    <td style="font-size:14px; color:#555;">
                        Hello <strong th:text="${name}">User</strong>,
                    </td>
                </tr>

                <!-- Message -->
                <tr>
                    <td style="padding:15px 0; font-size:14px; color:#555;">
                        Use the following OTP to complete your login process:
                    </td>
                </tr>

                <!-- OTP Box -->
                <tr>
                    <td align="center">
                        <div style="
                            font-size:28px;
                            letter-spacing:4px;
                            font-weight:bold;
                            color:#ffffff;
                            background:#4CAF50;
                            padding:12px 20px;
                            border-radius:6px;
                            display:inline-block;
                        "
                             th:text="${otp}">
                            123456
                        </div>
                    </td>
                </tr>

                <!-- Expiry -->
                <tr>
                    <td style="padding-top:15px; font-size:13px; color:#888;">
                        This OTP is valid for <strong>15 minutes</strong>.
                    </td>
                </tr>

                <!-- Divider -->
                <tr>
                    <td style="padding:20px 0;">
                        <hr style="border:none; border-top:1px solid #eee;">
                    </td>
                </tr>

                <!-- Footer -->
                <tr>
                    <td style="font-size:12px; color:#999; text-align:center;">
                        If you didn’t request this, you can safely ignore this email.
                    </td>
                </tr>

                <!-- App Name -->
                <tr>
                    <td style="padding-top:10px; font-size:12px; color:#bbb; text-align:center;">
                        © <span th:text="${appName}">Your App</span>
                    </td>
                </tr>

            </table>

        </td>
    </tr>
</table>

</body>
</html>
